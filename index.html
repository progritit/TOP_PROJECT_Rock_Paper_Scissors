```html
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar RPS</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>

<body>
    <main class="page">
        <!-- Main game shell: groups the full UI into one styled panel. -->
        <section class="game-container">
            <!-- Header keeps the brand, score, and round info visible at all times. -->
            <header class="game-header">
                <div class="logo-area">
                    <img src="./images/rps_splogo.png" alt="Solar RPS logo" class="logo">
                    <div>
                        <h1>SOLAR RPS</h1>
                        <p>Play clean. Play green.</p>
                    </div>
                </div>

                <!-- Score values use IDs because JavaScript updates them after each round. -->
                <div class="score-area">
                    <div class="score-card">
                        <span>Player</span>
                        <strong id="human-score">0</strong>
                    </div>

                    <div class="vs-badge">VS</div>

                    <div class="score-card">
                        <span>AI</span>
                        <strong id="computer-score">0</strong>
                    </div>
                </div>

                <div class="round-card">
                    <span>Round</span>
                    <strong id="round-number">1</strong>
                </div>
            </header>

            <!-- Dynamic message area for instructions, round results, and final game result. -->
            <div class="message-banner">
                <p id="game-message">Choose your move!</p>
            </div>

            <!-- Shows the current round choices separately from the clickable move buttons. -->
            <section class="battle-area">
                <!-- Decorative element styled in CSS to create the futuristic ring effect. -->
                <div class="energy-ring"></div>

                <article class="choice-panel">
                    <h2>Player's Choice</h2>
                    <p id="human-choice-display" class="choice-text">Empty</p>
                </article>

                <article class="choice-panel">
                    <h2>AI's Choice</h2>
                    <p id="computer-choice-display" class="choice-text">Empty</p>
                </article>
            </section>

            <!-- aria-label gives this button group an accessible name without adding a visible heading. -->
            <section class="buttons-area" aria-label="Choose your move">
                <!-- data-choice lets one JavaScript click handler read which move was selected. -->
                <button class="move-button rock-button" data-choice="rock">
                    <img src="./images/rps_rockbutton.png" alt="Rock">
                    <span>Rock</span>
                    <small>Crushes Scissors</small>
                </button>

                <button class="move-button paper-button" data-choice="paper">
                    <img src="./images/rps_paperbutton.png" alt="Paper">
                    <span>Paper</span>
                    <small>Covers Rock</small>
                </button>

                <button class="move-button scissors-button" data-choice="scissors">
                    <img src="./images/rps_scissorsbutton.png" alt="Scissors">
                    <span>Scissors</span>
                    <small>Cuts Paper</small>
                </button>
            </section>

            <!-- Keeps the rules visible so the player does not need to remember them. -->
            <footer class="rules-footer">
                <p>Rock beats Scissors • Scissors beats Paper • Paper beats Rock</p>
            </footer>

            <button id="reset-button" class="reset-button">Reset Game</button>

            <!-- The year span is filled by JavaScript so the footer stays current automatically. -->
            <footer class="site-footer">
                <p>
                    Copyright © Clebson Design
                    <span id="copyright-year"></span>
                    | All rights reserved.
                </p>
            </footer>
        </section>
    </main>
</body>

</html>
```
